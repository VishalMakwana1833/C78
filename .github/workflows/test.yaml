name: Model Training CICD

permissions:
  contents: write
  pull-requests: write
  id-token: write

on:
  push:
    branches:
      - main
      - master

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install CML
      - name: Install CML
        run: |
          npm install -g @dvcorg/cml

      # Upgrade pip
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      # Install Python dependencies
      - name: Install Requirements
        run: |
          pip install -r requirements.txt

      # Train model and generate reports
      - name: Train Model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python train_model.py

          echo "# RF and LR Model Score" > report.md
          cat scores.txt >> report.md

          echo "" >> report.md
          echo "# Confusion Matrix & Feature Importance" >> report.md
          echo '![](./ConfusionMatrix.png)' >> report.md
          echo '![](./FeatureImportance.png)' >> report.md

          cml comment create report.md
